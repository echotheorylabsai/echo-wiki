# Echo Wiki Frontmatter Schema
# Version: 1 (matches wiki.config.yaml schema_version)
#
# Defines required and optional frontmatter fields for all markdown files.
# Referenced by: .claude/skills/compile/SKILL.md, .claude/skills/lint/SKILL.md, hooks/pre-commit.sh
# wiki/ articles use compiled_shared; workspace files under wiki/workspaces/ use workspace schema

compiled_shared:
  required_fields:
    title: string
    type:
      enum: [concept, person, tool, source-summary]
    created: date  # YYYY-MM-DD
    last_updated: date
    last_verified: date
    decay_rate:
      enum: [fast, medium, slow]
    confidence:
      enum: [high, medium, speculative]
    tags: list[string]  # Values from wiki.config.yaml domains
    sources: list[string]  # Raw file paths (plain strings, not wikilinks)
    related: list[wikilink]
    summary: string  # One-line for index files

compiled_type_specific:
  concept:
    domain: list[string]
    prerequisites: list[wikilink]
  person:
    role: string
    affiliations: list[string]
    follows: list[url]
  tool:
    category:
      enum: [framework, platform, service, product]
    repo: url
    maintained: boolean
  source-summary:
    source_url: url
    source_type:
      enum: [blog, paper, tweet, substack, github, podcast, video]
    author: string
    source_date: date

raw:
  required_fields:
    title: string
    source_url: url
    source_type:
      enum: [blog, paper, tweet, substack, github, podcast, video]
    source_date: date
    author: string
    ingested: date
    ingestion_tool:
      enum: [tavily, firecrawl, local]
    tags: list[string]

workspace:
  required_fields:
    title: string
    created: date  # YYYY-MM-DD
    author: string  # actor name (human name or agent identifier)
    tags: list[string]
  optional_fields:
    summary: string
    related: list[wikilink]
    sources: list[string]

enums:
  type: [concept, person, tool, source-summary]
  decay_rate: [fast, medium, slow]
  confidence: [high, medium, speculative]
  source_type: [blog, paper, tweet, substack, github, podcast, video]
  tool_category: [framework, platform, service, product]
  ingestion_tool: [tavily, firecrawl, local]

decay_rate_thresholds:
  fast: 30    # days until considered stale
  medium: 90
  slow: 365

confidence_rules:
  high: "Well-sourced from multiple references or authoritative primary sources"
  medium: "Single source, or well-known but not independently verified"
  speculative: "Inferred, opinion-based, from unverified sources, or emerging claims"
